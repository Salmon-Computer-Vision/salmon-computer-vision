      hash: md5
      md5: 9a1e97420b95c978e10ec236c2645337
      size: 1266
    outs:
    - path: data/02_interim/yolo_condition_negatives
      hash: md5
      md5: c3505d079516f38874bdb42d2182cb46.dir
      size: 338928
      nfiles: 3
